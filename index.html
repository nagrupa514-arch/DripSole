<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr1pSole</title>

<style>
body {
  margin:0;
  font-family: 'Poppins', sans-serif;
  background:black;
  color:gold;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  padding:20px;
  border-bottom:1px solid gold;
}

.logo { font-size:24px; font-weight:bold; }
.cart { cursor:pointer; }

/* HERO */
.hero {
  text-align:center;
  padding:60px 20px;
}

/* PRODUCTS */
.products {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:30px;
  padding:40px;
}

.card {
  background:#111;
  padding:15px;
  width:220px;
  border:1px solid gold;
  transition:0.3s;
}

.card img {
  width:100%;
}

.card:hover {
  transform:scale(1.05);
}

button {
  background:gold;
  border:none;
  padding:10px;
  cursor:pointer;
  width:100%;
  margin-top:10px;
}

/* CART */
.cart-box {
  position:fixed;
  right:-100%;
  top:0;
  width:300px;
  height:100%;
  background:#111;
  padding:20px;
  transition:0.4s;
}

.cart-box.active { right:0; }

/* CHECKOUT */
.checkout {
  display:none;
  padding:40px;
  text-align:center;
}

input {
  padding:10px;
  width:80%;
  margin:10px;
}

/* SUCCESS */
.success {
  display:none;
  text-align:center;
  padding:50px;
  font-size:24px;
}
</style>
</head>

<body>

<nav>
  <div class="logo">Dr1pSole</div>
  <div class="cart" onclick="toggleCart()">🛒 (<span id="count">0</span>)</div>
</nav>

<section class="hero">
  <h1>Step Into Luxury 👟</h1>
</section>

<section class="products">

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Nike Air Replica</h3>
<p>₹1999</p>
<button onclick="addToCart('Nike Air Replica',1999)">Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Jordan High Copy</h3>
<p>₹2499</p>
<button onclick="addToCart('Jordan High Copy',2499)">Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Yeezy Boost Copy</h3>
<p>₹2999</p>
<button onclick="addToCart('Yeezy Boost Copy',2999)">Add to Cart</button>
</div>

</section>

<!-- CART -->
<div class="cart-box" id="cartBox">
  <h2>Cart</h2>
  <ul id="cartItems"></ul>
  <h3>Total ₹<span id="total">0</span></h3>
  <button onclick="goCheckout()">Checkout</button>
</div>

<!-- CHECKOUT -->
<div class="checkout" id="checkoutPage">
  <h2>Checkout</h2>
  <input placeholder="Full Name"><br>
  <input placeholder="Address"><br>
  <input placeholder="Phone Number"><br>
  <button onclick="pay()">Pay with UPI</button>
</div>

<!-- SUCCESS -->
<div class="success" id="successPage">
  ✅ Order Placed Successfully!
</div>

<script>
let cart = [];
let total = 0;

function addToCart(name, price){
  cart.push({name, price});
  total += price;
  document.getElementById("count").innerText = cart.length;
  updateCart();
}

function updateCart(){
  let list = document.getElementById("cartItems");
  list.innerHTML = "";

  cart.forEach((item, index) => {
    let li = document.createElement("li");
    li.innerHTML = item.name + " - ₹" + item.price +
    " <button onclick='removeItem("+index+")'>X</button>";
    list.appendChild(li);
  });

  document.getElementById("total").innerText = total;
}

function removeItem(i){
  total -= cart[i].price;
  cart.splice(i,1);
  document.getElementById("count").innerText = cart.length;
  updateCart();
}

function toggleCart(){
  document.getElementById("cartBox").classList.toggle("active");
}

function goCheckout(){
  document.querySelector(".products").style.display="none";
  document.getElementById("cartBox").style.display="none";
  document.getElementById("checkoutPage").style.display="block";
}

function pay(){
  alert("Simulated UPI Payment Successful ✅");
  document.getElementById("checkoutPage").style.display="none";
  document.getElementById("successPage").style.display="block";
}
</script>

</body>
</html>
